name: astrbot_plugin_private_companion
display_name: 我会永远陪着你
author: menglimi
description: astrbot_plugin_private_companion 是面向 AstrBot 的拟人陪伴与生活状态插件。它会让 Bot 拥有连续状态、生活日程、当前时段细化、梦境、日记、私下创作、重要日期、私聊关系记忆和群聊观察层,让 Bot 在私聊、群聊和后台生活里都更像一个持续存在的人。
desc: 让 Bot 拥有连续生活状态、私聊主动陪伴、群聊观察、梦境日记与长期创作能力的拟人陪伴插件。
help: |
  私聊发送：
  - 陪伴 状态
  - 陪伴 查看主动判定
  - 陪伴 重置插件
  - 陪伴 增添状态 <状态描述>[|持续小时]
  - 陪伴 查看今日日程
  - 陪伴 重置日程
  - 陪伴 当前细化
  - 陪伴 重置细化
  - 陪伴 能力列表
  - 陪伴 查看提示词 日程|细化|主动|回复注入
  - 陪伴 完整测试
  - 陪伴 结束完整测试
  - 陪伴模拟唤醒 <想模拟的用户消息>
  - 陪伴 生成状态
  - 陪伴 梦境
  - 陪伴 梦境碎片
  - 陪伴 画像
  - 陪伴 记忆
  - 陪伴 表达学习
  - 陪伴 气氛
  - 陪伴 片段
  - 陪伴 长期记忆
  - 陪伴 日记
  - 陪伴 生成日记
  - 陪伴 日期列表
  - 陪伴 日期添加 <标题> <YYYY-MM-DD或MM-DD> [备注]
  - 陪伴 日期删除 <标题关键词>
  - 陪伴 可做事项
  - 陪伴 昵称 <称呼>
  - 陪伴 语气 温柔|活泼|工作
  - 陪伴 清空记忆

  群聊发送：
  - 陪伴群 状态
  - 陪伴群 黑话
  - 陪伴群 群友
  - 陪伴群 话题
  - 陪伴群 片段
  - 陪伴群 插话反馈
  - 陪伴群 关系网
  - 陪伴群 开启
  - 陪伴群 关闭

  本插件不只限于私聊。私聊陪伴默认开启；配置页 target_user_ids 里的 QQ 会自动预热主动消息。群聊陪伴支持白名单/黑名单模式,默认白名单,不会主动抢话。插件遵守每日上限、最小间隔、免打扰时间、群聊插话间隔和主动生图额度。看屏幕、生图、戳一戳、语音、QQ 状态同步、B 站 Bot 等联动能力都是可选项,缺失时会自动跳过或回退。
version: 2.2.0
support_platforms:
  - aiocqhttp
astrbot_version: ">=4.22.0"
